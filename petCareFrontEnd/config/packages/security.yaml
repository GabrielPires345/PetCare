security:
    password_hashers:
        App\Security\User\SessionUser: 'auto'

    providers:
        session_user_provider:
            id: App\Security\User\SessionUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: session_user_provider
            custom_authenticators:
                - App\Security\SessionAuthenticator
            logout:
                path: app_logout
                target: app_home

    access_control:
        - { path: ^/app, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Security\User\SessionUser:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
